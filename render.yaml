services:
  #
  # Backend
  #
  - type: web
    name: voice-agent-api
    runtime: python
    plan: free

    rootDir: backend

    buildCommand: |
      pip install uv
      uv sync

    startCommand: |
      uv run uvicorn api:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5

      - key: WEB_ORIGIN
        value: https://voice-agent-web.onrender.com

      - key: GROQ_API_KEY
        sync: false

      - key: CARTESIA_API_KEY
        sync: false

      - key: OPENAI_API_KEY
        sync: false

  #
  # Frontend
  #
  - type: web
    name: voice-agent-web
    runtime: static
    plan: free

    rootDir: frontend

    buildCommand: npm install && npm run build

    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://voice-agent-api.onrender.com