services:
  #
  # Backend
  #
  - type: web
    name: voice-agent-api
    runtime: python
    plan: free

    buildCommand: |
      pip install uv
      uv sync

    startCommand: |
      uv run uvicorn backend.api:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5

      - key: WEB_ORIGIN
        value: https://voice-agent-web.onrender.com

      - key: GROQ_API_KEY
        sync: false

      - key: CARTESIA_API_KEY
        sync: false

      - key: CARTESIA_VOICE_ID
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      - key: GROQ_LLM_MODEL
        value: llama-3.3-70b-versatile

      - key: GROQ_STT_MODEL
        value: whisper-large-v3-turbo

      - key: CARTESIA_MODEL_ID
        value: sonic-3.5

      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small

      - key: DEFAULT_BOT
        value: healthcare

  #
  # Frontend
  #
  - type: web
    name: voice-agent-web
    runtime: static

    rootDir: frontend

    buildCommand: npm install && npm run build

    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://voice-agent-api.onrender.com